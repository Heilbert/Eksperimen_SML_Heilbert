name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run automated preprocessing
        run: |
          cd preprocessing
          python automate_Heilbert.py

      - name: Upload preprocessing artifact
        uses: actions/upload-artifact@v4
        with:
          name: diabetes_preprocessing
          path: preprocessing/diabetes_preprocessing